<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HW3</title>

    <style>
        /* 表格樣式 */
        table {
            border-collapse: collapse;
            width: 300px;
        }

        th, td {
            border: 2px solid black;
            text-align: left;
            padding: 10px;
        }

        /* 表頭 */
        th {
            background-color: gray;
            color: white;
        }

        /* 奇數列（黃色） */
        tr:nth-child(2),
        tr:nth-child(4) {
            background-color: yellow;
        }

        /* 偶數列（灰色） */
        tr:nth-child(3) {
            background-color: white;
        }

        /* 固定在右上角的 div */
        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            border: 4px solid green;
            padding: 20px;
            width: 150px;
            background-color: white;
        }
    </style>
</head>

<body>

    <h2></h2>

    <table>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr>
            <td>1</td>
            <td>1</td>
        </tr>
        <tr>
            <td>2</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
            <td>3</td>
        </tr>
    </table>

    <!-- 固定在右上角 -->
    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
